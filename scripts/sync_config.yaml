source:
  bucket: your-source-bucket
  prefix: your/source/prefix

destination:
  bucket: your-dest-bucket
  prefix: your/dest/prefix

aws:
  retry_mode: standard
  max_attempts: 15
  max_pool_connections: 80

copy:
  extra_args: {}

execution:
  workers: 8
  per_file_concurrency: 4
  multipart_threshold_mb: 128
  multipart_chunk_mb: 64
  max_in_flight: 32

  dry_run: true
  limit: 10

  state_file: s3_sync_state.txt
  fail_log_file: s3_sync_failures.log

  stop_on_expired_token: true

  retryable_attempts: 5
  retry_backoff_base_seconds: 2
  retry_backoff_max_seconds: 30
