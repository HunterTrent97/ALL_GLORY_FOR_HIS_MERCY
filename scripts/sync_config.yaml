# =========================
# SOURCE BUCKET
# =========================
source:
  bucket: your-source-bucket        # Bucket name ONLY (no s3://)
  prefix: your/source/prefix        # Path inside bucket

# =========================
# DESTINATION BUCKET
# =========================
destination:
  bucket: your-dest-bucket
  prefix: your/dest/prefix

# =========================
# AWS SETTINGS
# =========================
aws:
  region: us-gov-west-1             # REQUIRED for GovCloud

# =========================
# EXECUTION SETTINGS
# =========================
execution:
  dry_run: true                     # true = simulate only, false = real sync

  # Retry behavior (handled in Python)
  retryable_attempts: 5
  retry_backoff_base_seconds: 2
  retry_backoff_max_seconds: 30

  # Failure logging file
  fail_log_file: s3_sync_failures.log
